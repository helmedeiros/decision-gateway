# Canonical three-service stack for the Pricing Decision Platform.
#
# Layout:
#   traffic-gen -> decision-gateway -> markup-svc
#                     |
#                     +-- correlation ID propagation
#                     +-- one gateway.access JSON line per request
#
# Pulls public images from ghcr.io; all three are public so operators
# do not need to clone any repo to run a smoke. The decision-gateway
# image is the canonical 'front door' for the platform; the older
# two-service compose in the traffic-gen repo stays for operators
# who want to smoke-test traffic-gen against markup-svc directly
# without a gateway in between.
#
# Usage:
#   docker compose up                          # foreground; both services + logs
#   docker compose up -d                       # detached; long-run mode
#   docker compose logs -f decision-gateway    # JSON access events from the gateway
#   docker compose down                        # stop and remove
#
# See docs/cookbook/compose-stack.md for the operator walkthrough.

services:
  markup-svc:
    image: ghcr.io/helmedeiros/markup-svc:v0.1.17
    command:
      - --rules=/etc/markup/rules.csv
      - --listen=:8080
      - --otel-enabled
      - --metrics-enabled
    environment:
      # OTel SDK env vars per markup-svc ADR-0009 + ADR-0016. v0.1.5
      # bootstraps an OTLP gRPC exporter + batched TracerProvider in
      # the binary when --otel-enabled is set; earlier tags shipped
      # the decorator only and dropped spans on the no-op provider.
      # Traces flow to the pricing-observability OTel Collector which
      # forwards to Jaeger with Elasticsearch storage per that repo's
      # ADR-0002. The Collector binds host port 4317 (gRPC) in the
      # observability compose; markup-svc reaches it via
      # host.docker.internal since the platform compose and the
      # observability compose run on different Docker networks. When
      # the observability stack is NOT running, the OTel SDK retries
      # the export with exponential backoff and logs a warning --
      # /decide stays up.
      - OTEL_SERVICE_NAME=markup-svc
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_SAMPLER=parentbased_always_on
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./compose-fixtures/rules.csv:/etc/markup/rules.csv:ro
    ports:
      # Expose 8080 to the host so Prometheus scrapes /metrics
      # directly (the gateway now owns /metrics on 8090 per ADR-0007).
      - "8080:8080"

  decision-gateway:
    image: ghcr.io/helmedeiros/decision-gateway:v0.0.9
    depends_on:
      - markup-svc
    command:
      - --listen=:8090
      - --route=/decide=>http://markup-svc:8080
      - --route=/admin=>http://markup-svc:8080
      - --backend-timeout=5s
      - --otel-enabled
      - --metrics-enabled
    environment:
      # OTel SDK env vars per decision-gateway ADR-0002. The gateway
      # becomes a trace-context hop: it extracts incoming W3C
      # traceparent (set by traffic-gen in v0.0.3+), opens a
      # gateway.request span, opens a gateway.proxy.upstream child
      # span around the markup-svc call, and injects traceparent on
      # the outbound request so markup-svc joins the same trace.
      # The Collector binds host port 4317 (gRPC); the gateway reaches
      # it via host.docker.internal since the platform compose and
      # the observability compose run on different Docker networks.
      - OTEL_SERVICE_NAME=decision-gateway
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_SAMPLER=parentbased_always_on
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8090:8090"

  traffic-gen:
    image: ghcr.io/helmedeiros/traffic-gen:v0.0.7
    depends_on:
      - decision-gateway
    command:
      - --target=http://decision-gateway:8090/decide
      - --profile=exp:10->500@5m
      - --preset=default
      - --otel-enabled
      - --metrics-listen=:9101
      - --admin-target=http://decision-gateway:8090/admin/reload
      - --admin-interval=30s
    ports:
      - "9101:9101"
    environment:
      # OTel SDK env vars per traffic-gen ADR-0004. traffic-gen is the
      # trace ROOT of the platform pipeline: each outbound POST gets
      # a fresh traffic.request span; the gateway extracts the
      # propagated traceparent and continues the trace; markup-svc
      # joins as the leaf. The whole traffic-gen -> decision-gateway
      # -> markup-svc waterfall renders as one trace in Jaeger UI.
      - OTEL_SERVICE_NAME=traffic-gen
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://host.docker.internal:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_TRACES_SAMPLER=parentbased_always_on
    extra_hosts:
      - "host.docker.internal:host-gateway"
